name: Cache external images

on:
  push:
    branches: [main]
    paths: ['index.html']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cache-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download and cache external images
        run: |
          mkdir -p assets/images
          python3 << 'PYEOF'
          import re, os, urllib.request, sys

          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()

          pattern = re.compile(r'(https://[^\s"\']+\.(?:jpg|jpeg|png|gif|webp|JPG|JPEG|PNG)(?:\?[^"\']*)?)', re.IGNORECASE)
          urls = list(dict.fromkeys(pattern.findall(html)))  # unique, preserve order

          changed = False
          for url in urls:
              raw_filename = url.split('/')[-1].split('?')[0]
              # URL-decode filename for the local path
              from urllib.parse import unquote
              filename = unquote(raw_filename)
              local_path = f'assets/images/{filename}'

              if os.path.exists(local_path):
                  print(f'Already cached: {filename}')
              else:
                  print(f'Downloading: {url}')
                  try:
                      req = urllib.request.Request(
                          url,
                          headers={'User-Agent': 'Mozilla/5.0 (compatible; TripPlanBot/1.0)'}
                      )
                      with urllib.request.urlopen(req, timeout=30) as resp:
                          with open(local_path, 'wb') as f:
                              f.write(resp.read())
                      print(f'  ✓ Saved as {local_path}')
                  except Exception as e:
                      print(f'  ✗ Failed ({e}) — keeping external URL')
                      continue

              # Replace external URL with local path in HTML
              if url in html:
                  html = html.replace(url, local_path)
                  changed = True

          if changed:
              with open('index.html', 'w', encoding='utf-8') as f:
                  f.write(html)
              print('index.html updated with local image paths')
          else:
              print('No changes needed')
          PYEOF

      - name: Commit cached images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/ index.html
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: cache external images locally [skip ci]"
            git push
          fi
